<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Platform</title>
    <style>
        :root {
            --bg-blue: #eff5fb;
            --bg-green: #f1faf4;
            --bg-red: #fce8e8;
            --bg-yellow: #fdfae2;
            --bg-purple: #f9eff5;
            --bg-white: #fff;
            --text-green: #155724;
            --text-red: #721c24;
            --text-yellow: #856404;
            --text-blue: #0c5460;
            --text-purple: #6d5869;
            --accent: #4a90d9;
            --accent-hover: #357abd;
            --border: #e2e8f0;
            --bg-page: #f0f4f8;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg-page);
            color: #1a202c;
            padding: 24px;
            line-height: 1.5;
        }

        .container { max-width: 960px; margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        header .subtitle {
            font-size: 13px;
            color: #718096;
        }

        .card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card h2 {
            font-size: 17px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .icon { font-size: 20px; }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 13px;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 14px;
            background: #fafbfc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }

        .row { display: flex; gap: 14px; }
        .row > div { flex: 1; }

        button#submitBtn {
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 6px rgba(74,144,217,0.3);
        }
        button#submitBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74,144,217,0.4);
        }
        button#submitBtn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .customer-info {
            background: var(--bg-blue);
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 13px;
            line-height: 1.9;
            border: 1px solid #d4e4f7;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-active { background: var(--bg-green); color: var(--text-green); }
        .badge-blocked { background: var(--bg-red); color: var(--text-red); }
        .badge-low { background: var(--bg-yellow); color: var(--text-yellow); }
        .badge-medium { background: var(--bg-blue); color: var(--text-blue); }
        .badge-high { background: var(--bg-red); color: var(--text-red); }

        .cash-accounts { margin-top: 8px; }
        .cash-account {
            display: inline-block;
            background: var(--bg-purple);
            padding: 6px 14px;
            border-radius: 20px;
            margin-right: 8px;
            margin-top: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-purple);
            border: 1px solid #e8d5e3;
        }

        #result {
            margin-top: 18px;
            padding: 18px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        #result.approved {
            display: block;
            background: var(--bg-green);
            border: 1px solid #b7e4c7;
        }
        #result.rejected {
            display: block;
            background: var(--bg-red);
            border: 1px solid #f5c6cb;
        }
        #result h3 { margin-bottom: 8px; font-size: 16px; }
        #result ul { margin: 8px 0 8px 20px; }
        #result li { margin-bottom: 4px; }
        #result p { margin: 6px 0; font-size: 14px; }
        #result details { margin-top: 10px; }
        #result summary {
            cursor: pointer;
            font-size: 13px;
            color: #4a5568;
            font-weight: 600;
        }
        #result pre {
            background: rgba(0,0,0,0.04);
            padding: 10px;
            border-radius: 6px;
            font-size: 11px;
            overflow-x: auto;
            margin-top: 6px;
            line-height: 1.4;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .orders-table th {
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #f7fafc;
            border-bottom: 2px solid var(--border);
        }
        .orders-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #edf2f7;
        }
        .orders-table tr:hover td { background: #f7fafc; }

        .status-routed {
            display: inline-block;
            background: var(--bg-green);
            color: var(--text-green);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        em { color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Trading Platform</h1>
                <div class="subtitle">ICS Group One – Order Management</div>
            </div>
        </header>

        <div class="card">
            <h2><span class="icon">📋</span> Place Order</h2>

            <label>Customer</label>
            <select id="customerSelect"><option value="">Loading...</option></select>

            <div id="customerInfo" class="customer-info" style="display:none;"></div>

            <label>Instrument (ISIN)</label>
            <select id="isinSelect"><option value="">Loading...</option></select>

            <div class="row">
                <div>
                    <label>Account / Currency</label>
                    <select id="currencySelect"><option value="EUR">EUR</option></select>
                </div>
                <div>
                    <label>Quantity</label>
                    <input type="number" id="quantity" value="10" min="1">
                </div>
                <div>
                    <label>Price per Unit</label>
                    <input type="number" id="price" value="100" min="0" step="0.01">
                </div>
            </div>

            <button id="submitBtn" onclick="placeOrder()">Submit Order</button>
            <div id="result"></div>
        </div>

        <div class="card">
            <h2><span class="icon">📊</span> Routed Orders</h2>
            <div id="orderHistory"><em>No orders yet</em></div>
        </div>
    </div>

    <script>
        let currentCustomer = null;

        async function loadCustomers() {
            try {
                const resp = await fetch('/api/customers');
                const data = await resp.json();
                const select = document.getElementById('customerSelect');
                select.innerHTML = '<option value="">-- select customer --</option>';
                data.forEach(c => {
                    const id = c.externalCustomerNumber;
                    select.innerHTML += `<option value="${id}">${id} – ${c.fullName || id} (${c.status})</option>`;
                });
            } catch (e) {
                document.getElementById('customerSelect').innerHTML = '<option>PMS not reachable</option>';
            }
        }

        async function loadInstruments() {
            try {
                const resp = await fetch('/api/instruments');
                const data = await resp.json();
                const select = document.getElementById('isinSelect');
                select.innerHTML = '<option value="">-- select instrument --</option>';
                data.forEach(i => {
                    select.innerHTML += `<option value="${i.isin}">${i.isin} – ${i.name || i.isin}</option>`;
                });
            } catch (e) {
                document.getElementById('isinSelect').innerHTML = '<option>PMS not reachable</option>';
            }
        }

        document.getElementById('customerSelect').addEventListener('change', async function() {
            const id = this.value;
            const info = document.getElementById('customerInfo');
            const ccySelect = document.getElementById('currencySelect');
            if (!id) { info.style.display = 'none'; currentCustomer = null; return; }

            try {
                const resp = await fetch('/api/customer/' + id);
                currentCustomer = await resp.json();
                const c = currentCustomer;
                const statusCls = (c.status || '').toLowerCase();
                const riskCls = (c.riskProfile || '').toLowerCase();

                let html = `<strong>${c.fullName}</strong> &nbsp;
                    Status: <span class="badge badge-${statusCls}">${c.status}</span> &nbsp;
                    Risk: <span class="badge badge-${riskCls}">${c.riskProfile}</span> &nbsp;
                    Country: ${c.country || '–'}
                    <div class="cash-accounts"><strong>Cash Accounts:</strong><br>`;

                ccySelect.innerHTML = '';
                if (c.cashAccounts) {
                    c.cashAccounts.forEach((a, i) => {
                        html += `<span class="cash-account">${a.amount.toLocaleString()} ${a.currency}</span>`;
                        ccySelect.innerHTML += `<option value="${a.currency}">${a.currency} (${a.amount.toLocaleString()} available)</option>`;
                    });
                }
                html += '</div>';
                info.innerHTML = html;
                info.style.display = 'block';
            } catch (e) {
                info.innerHTML = 'Could not load customer';
                info.style.display = 'block';
            }
        });

        async function placeOrder() {
            const customerId = document.getElementById('customerSelect').value;
            const isin       = document.getElementById('isinSelect').value;
            const quantity   = parseFloat(document.getElementById('quantity').value);
            const price      = parseFloat(document.getElementById('price').value);
            const currency   = document.getElementById('currencySelect').value;

            if (!customerId || !isin) { alert('Select customer and instrument'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'Processing...';

            try {
                const resp = await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customerId, isin, quantity, pricePerUnit: price, currency })
                });
                const data = await resp.json();
                const resultDiv = document.getElementById('result');
                const approved = data.orderStatus === 'APPROVED';
                resultDiv.className = approved ? 'approved' : 'rejected';

                let html = `<h3>${approved ? '✅ Order Approved & Routed' : '❌ Order Rejected'}</h3>`;
                if (data.rejectionReasons && data.rejectionReasons.length > 0) {
                    html += '<ul>' + data.rejectionReasons.map(r => `<li>${r}</li>`).join('') + '</ul>';
                }
                if (approved && data.routingResult) {
                    const r = data.routingResult;
                    html += `<p>Order ID: <strong>${r.orderId || ''}</strong>
                             &nbsp;|&nbsp; Broker: ${r.broker || ''}
                             &nbsp;|&nbsp; Status: <span class="status-routed">${r.status || ''}</span></p>`;
                }
                html += `<details><summary>Full response</summary><pre>${JSON.stringify(data, null, 2)}</pre></details>`;
                resultDiv.innerHTML = html;

                loadOrderHistory();
            } catch (e) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'rejected';
                resultDiv.innerHTML = `<h3>Error</h3><p>${e.message}</p>`;
            } finally {
                btn.disabled = false; btn.textContent = 'Submit Order';
            }
        }

        async function loadOrderHistory() {
            try {
                const resp = await fetch('http://localhost:8086/api/orders');
                const orders = await resp.json();
                const div = document.getElementById('orderHistory');
                if (orders.length === 0) { div.innerHTML = '<em>No orders yet</em>'; return; }
                let html = `<table class="orders-table">
                    <tr><th>Order ID</th><th>Customer</th><th>ISIN</th><th>Qty</th><th>Price</th><th>Currency</th><th>Broker</th><th>Status</th><th>Time</th></tr>`;
                orders.forEach(o => {
                    html += `<tr><td>${o.orderId}</td><td>${o.customerId}</td><td>${o.isin}</td>
                        <td>${o.quantity}</td><td>${o.price}</td><td>${o.currency}</td>
                        <td>${o.broker || ''}</td><td><span class="status-routed">${o.status}</span></td><td>${o.timestamp}</td></tr>`;
                });
                html += '</table>';
                div.innerHTML = html;
            } catch (e) { }
        }

        loadCustomers();
        loadInstruments();
        loadOrderHistory();
    </script>
</body>
</html>
